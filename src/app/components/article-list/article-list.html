<div class="max-w-4xl mx-auto">
  <h1 class="text-3xl font-bold mb-6 text-gray-900">Posts</h1>

  @if (store.loading()) {
    <div class="flex items-center justify-center py-12">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
      <span class="ml-3 text-gray-500">Loading posts...</span>
    </div>
  }

  <div class="flex items-center justify-between mb-4">
    <p class="text-sm text-gray-500">{{ store.filteredPosts().length }} posts</p>
    <div class="flex items-center gap-2">
      <label for="user" class="text-sm text-gray-600">Filter by user:</label>
      <select
        id="user"
        class="text-sm border border-gray-300 rounded-md px-2 py-1 bg-white"
        (change)="onFilterChange($event)"
      >
        <option value="">All users</option>
        @for (id of store.availableUserIds(); track id) {
          <option [value]="id" [selected]="store.filters().user === id">
            User {{ id }}
          </option>
        }
      </select>
    </div>
  </div>

  <div class="space-y-4">
    @for (post of store.filteredPosts(); track post.id) {
      <a
        [routerLink]="['/articles', post.id]"
        class="block bg-white rounded-lg shadow-sm border border-gray-200 p-6 hover:shadow-md hover:border-indigo-300 transition-all"
      >
        <h2 class="text-xl font-semibold text-gray-900 mb-2">
          {{ post.title }}
        </h2>
        <p class="text-gray-600 mb-3 line-clamp-2">
          {{ post.body }}
        </p>
        <div class="flex items-center text-sm text-gray-400 gap-4">
          <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">
            User {{ post.user }}
          </span>
          <span class="ml-auto text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">
            #{{ post.id }}
          </span>
        </div>
      </a>
    }
  </div>
</div>
